services:
  acexy:
    image: fralermo/acexy:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acexy-orchestrator
    restart: unless-stopped
    ports:
      - "8080:8080/tcp"
    environment:
      # Acexy core config
      ACEXY_LISTEN_ADDR: ":8080"
      ACEXY_SCHEME: "http"
      ACEXY_M3U8_STREAM_TIMEOUT: "60s"
      ACEXY_M3U8: "false"
      ACEXY_EMPTY_TIMEOUT: "20s"
      ACEXY_BUFFER_SIZE: "4MB"
      ACEXY_NO_RESPONSE_TIMEOUT: "3s"
      ACEXY_LOG_LEVEL: "INFO"

      # Orchestrator config
      ACESTREAM_MIN_REPLICAS: "1"
      ACESTREAM_MAX_REPLICAS: "5"
      ACESTREAM_STREAMS_PER_INSTANCE: "2"
      ACESTREAM_IDLE_TIMEOUT: "10s"
      ACESTREAM_RECYCLE_TIMEOUT: "15s"
      ACESTREAM_IMAGE: "wafy80/acestream:latest"
      COMPOSE_PROFILE: "regular"

      # Docker socket proxy
      DOCKER_HOST: "tcp://docker-proxy:2375"
    networks:
      - acexy-orchestrator-network
    depends_on:
      docker-proxy:
        condition: service_started

  docker-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: docker-proxy
    privileged: true
    environment:
      CONTAINERS: 1
      IMAGES: 1
      POST: 1
      DELETE: 1
      NETWORKS: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - acexy-orchestrator-network
    restart: unless-stopped

  # Gluetun (opcional, solo necesario con COMPOSE_PROFILE=vpn)
  # gluetun:
  #   image: qmcgaw/gluetun
  #   container_name: gluetun
  #   cap_add:
  #     - NET_ADMIN
  #   environment:
  #     - VPN_SERVICE_PROVIDER=your_provider
  #     - VPN_TYPE=openvpn
  #     # ... resto config VPN
  #   networks:
  #     - media-network
  #   restart: unless-stopped

networks:
  acexy-orchestrator-network:
    name: acexy-orchestrator-network
    driver: bridge
