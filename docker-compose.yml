services:
  acexy:
    image: local/acexy:latest
    container_name: acexy-orchestrator
    labels:
      autoheal-app: true
    restart: always
    stop_grace_period: 2m # 2 minutos
    healthcheck:
      interval: 60s
      timeout: 15s
      retries: 5  # Total: ~5 minutos de margen antes de ser 'unhealthy'
    ports:
      - "8888:8888/tcp"
    environment:
      # Acexy core config
      ACEXY_LISTEN_ADDR: ":8888"
      ACEXY_SCHEME: "http"
      ACEXY_M3U8_STREAM_TIMEOUT: "60s"
      ACEXY_M3U8: "false"
      ACEXY_EMPTY_TIMEOUT: "20s"
      ACEXY_BUFFER_SIZE: "2MB"
      ACEXY_NO_RESPONSE_TIMEOUT: "15s"
      ACEXY_LOG_LEVEL: "INFO"
      # Orchestrator config
      ACESTREAM_MIN_REPLICAS: "3"
      ACESTREAM_MAX_REPLICAS: "3"
      ACESTREAM_STREAMS_PER_INSTANCE: "1"
      ACESTREAM_IDLE_TIMEOUT: "10s"
      ACESTREAM_RECYCLE_TIMEOUT: "0s"
      ACESTREAM_IMAGE: "local/acestream:latest"
      COMPOSE_PROFILE: "regular"
      # Docker socket proxy
      DOCKER_HOST: "tcp://docker-proxy:2375"
    networks:
      - acexy-orchestrator-network
    depends_on:
      docker-proxy:
        condition: service_started
  docker-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: docker-proxy
    privileged: true
    environment:
      CONTAINERS: 1
      IMAGES: 1
      POST: 1
      DELETE: 1
      NETWORKS: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - acexy-orchestrator-network
    restart: unless-stopped
  # Gluetun (opcional, solo necesario con COMPOSE_PROFILE=vpn)
  # gluetun:
  #   image: qmcgaw/gluetun
  #   container_name: gluetun
  #   cap_add:
  #     - NET_ADMIN
  #   environment:
  #     - VPN_SERVICE_PROVIDER=your_provider
  #     - VPN_TYPE=openvpn
  #     # ... resto config VPN
  #   networks:
  #     - media-network
  #   restart: unless-stopped
  autoheal:
    image: willfarrell/autoheal
    container_name: autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal-app
      - AUTOHEAL_INTERVAL=60
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - acexy-orchestrator-network
networks:
  acexy-orchestrator-network:
    name: acexy-orchestrator-network
    driver: bridge
